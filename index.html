<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princesse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cloud-1: #fbe1e9;
    --cloud-2: #f7cdd9;
    --cloud-3: #fef1f4;
    --base: #fffdfb;
    --ink: #4a2e3b;
    --ink-soft: #7a5b68;
    --gold: #c9a05a;
    --gold-soft: #e3c489;
    --card: #fffaf7;
    --line: rgba(74,46,59,0.10);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    min-height:100vh;
    background: linear-gradient(180deg, var(--base) 0%, var(--cloud-3) 38%, var(--cloud-1) 100%);
    font-family:'Manrope', sans-serif;
    color:var(--ink);
    overflow-x:hidden;
    position:relative;
  }

  @media (prefers-reduced-motion: no-preference){
    .cloud{ animation: drift 50s ease-in-out infinite; }
    .cloud.c2{ animation-duration:65s; animation-direction:reverse; }
    .cloud.c3{ animation-duration:80s; }
  }
  @keyframes drift{
    0%{ transform: translateX(0) translateY(0); }
    50%{ transform: translateX(2.5vw) translateY(-1.2vh); }
    100%{ transform: translateX(0) translateY(0); }
  }

  .sky{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .cloud{ position:absolute; border-radius:50%; filter: blur(18px); opacity:0.55; }
  .cloud.c1{ width:340px; height:160px; background:var(--cloud-2); top:6%; left:-4%; }
  .cloud.c2{ width:280px; height:140px; background:var(--cloud-1); top:18%; right:2%; opacity:0.5;}
  .cloud.c3{ width:380px; height:170px; background:var(--cloud-2); top:62%; left:18%; opacity:0.35;}
  .cloud.c4{ width:240px; height:120px; background:var(--cloud-1); top:78%; right:14%; opacity:0.4;}

  .wrap{
    position:relative; z-index:1;
    max-width:560px; margin:0 auto;
    padding: 48px 20px 24px;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
  }

  .crown{ width:26px; height:auto; margin-bottom:10px; opacity:0.9; }
  .brand{
    font-family:'Italiana', serif; font-size: clamp(30px, 7vw, 40px);
    letter-spacing:0.04em; color:var(--ink); margin:0 0 4px; line-height:1.1; text-align:center;
  }
  .tagline{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:17px;
    color:var(--ink-soft); margin:0 0 26px; letter-spacing:0.01em; text-align:center;
  }

  /* --- Écran verrou --- */
  #lock-screen{
    width:100%; max-width:380px; margin-top:40px;
    background:var(--card); border:1px solid var(--line); border-radius:22px;
    box-shadow: 0 18px 40px -20px rgba(74,46,59,0.25);
    padding:28px 24px; text-align:center;
  }
  #lock-screen p{ font-size:14.5px; color:var(--ink-soft); margin:0 0 16px; }
  #lock-input{
    width:100%; padding:12px 16px; border-radius:30px; border:1px solid var(--line);
    font-family:'Manrope'; font-size:15px; outline:none; text-align:center; margin-bottom:12px;
  }
  #lock-input:focus{ border-color: var(--gold-soft); }
  #lock-btn{
    width:100%; padding:12px; border-radius:30px; border:none;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold));
    color:#fff; font-family:'Manrope'; font-weight:600; font-size:15px; cursor:pointer;
  }
  #lock-error{ color:#b5475c; font-size:13px; margin-top:10px; min-height:16px; }

  /* --- Transition de bienvenue --- */
  #welcome-overlay{
    position:fixed; inset:0; z-index:10;
    background: linear-gradient(180deg, var(--base) 0%, var(--cloud-1) 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px;
    opacity:1; transition: opacity 0.7s ease;
  }
  #welcome-overlay.fade-out{ opacity:0; pointer-events:none; }
  #welcome-overlay .w-title{
    font-family:'Italiana', serif; font-size: clamp(26px, 6vw, 34px); color:var(--ink); margin-bottom:10px;
    opacity:0; animation: riseIn 0.8s ease forwards; animation-delay:0.15s;
  }
  #welcome-overlay .w-sub{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:17px; color:var(--ink-soft);
    opacity:0; animation: riseIn 0.8s ease forwards; animation-delay:0.55s;
  }
  @keyframes riseIn{ from{ opacity:0; transform: translateY(8px); } to{ opacity:1; transform: translateY(0); } }

  /* --- Carte de chat --- */
  #chat-card{
    width:100%; background:var(--card); border:1px solid var(--line); border-radius:22px;
    box-shadow: 0 18px 40px -20px rgba(74,46,59,0.25), 0 2px 8px rgba(74,46,59,0.04);
    padding:18px 16px 14px; display:flex; flex-direction:column; flex:1; min-height:0;
  }
  .chat-head{
    display:flex; align-items:center; gap:10px; padding-bottom:12px; margin-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .dot{ width:9px;height:9px;border-radius:50%; background: var(--gold-soft); box-shadow:0 0 0 4px rgba(201,160,90,0.12); }
  .chat-head span{ font-size:12.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); }

  #messages{
    flex:1; overflow-y:auto; padding:4px 2px 8px; min-height:280px; max-height:55vh;
  }
  .msg{ max-width:86%; padding:11px 15px; border-radius:16px; font-size:15px; line-height:1.5; margin-bottom:10px; white-space:pre-wrap; }
  .msg.ai{ background: linear-gradient(135deg, #fdeef2, #fbe3ea); color:var(--ink); border-bottom-left-radius:5px; }
  .msg.user{ background:#fff; border:1px solid var(--line); margin-left:auto; border-bottom-right-radius:5px; color:var(--ink); }
  .msg.typing{ opacity:0.6; font-style:italic; }
  .msg .debug-detail{ display:block; margin-top:6px; font-size:11px; color:#b5475c; opacity:0.8; white-space:pre-wrap; }

  #input-row{ margin-top:10px; display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:30px; padding:6px 6px 6px 16px; }
  #text-input{ flex:1; border:none; outline:none; font-family:'Manrope'; font-size:15px; background:transparent; color:var(--ink); }
  #send-btn{
    width:36px;height:36px;border-radius:50%; border:none; flex-shrink:0; cursor:pointer;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold)); color:#fff; font-size:16px;
  }
  #send-btn:disabled{ opacity:0.5; cursor:default; }

  .footnote{ margin-top:18px; font-size:11.5px; color:var(--ink-soft); opacity:0.6; letter-spacing:0.03em; text-align:center; }

  .hidden{ display:none !important; }
</style>
</head>
<body>

  <div class="sky">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="cloud c4"></div>
  </div>

  <div class="wrap">
    <svg class="crown" viewBox="0 0 64 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 32 L10 12 L22 24 L32 6 L42 24 L54 12 L60 32 Z" stroke="#c9a05a" stroke-width="2" stroke-linejoin="round" fill="none"/>
      <circle cx="10" cy="10" r="2.4" fill="#c9a05a"/>
      <circle cx="32" cy="4" r="2.6" fill="#c9a05a"/>
      <circle cx="54" cy="10" r="2.4" fill="#c9a05a"/>
      <line x1="4" y1="34" x2="60" y2="34" stroke="#c9a05a" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <h1 class="brand">Princesse</h1>
    <p class="tagline">nos souvenirs, toujours à portée de main</p>

    <div id="lock-screen">
      <p>🔑 Entrer dans le royaume des souvenirs</p>
      <input id="lock-input" type="password" placeholder="Clé secrète" autocomplete="off">
      <button id="lock-btn">Entrer</button>
      <div id="lock-error"></div>
    </div>

    <div id="chat-card" class="hidden">
      <div class="chat-head">
        <div class="dot"></div>
        <span>en ligne</span>
      </div>
      <div id="messages"></div>
      <div id="input-row">
        <input id="text-input" type="text" placeholder="Que souhaites-tu retrouver aujourd'hui ?" autocomplete="off">
        <button id="send-btn">➤</button>
      </div>
    </div>

    <p class="footnote">un petit coin de souvenirs, juste pour toi</p>
  </div>

  <div id="welcome-overlay" class="hidden">
    <div class="w-title">✨ Bienvenue princesse</div>
    <div class="w-sub">Une mémoire vivante de notre histoire</div>
  </div>

<script>
  const lockScreen = document.getElementById('lock-screen');
  const lockInput = document.getElementById('lock-input');
  const lockBtn = document.getElementById('lock-btn');
  const lockError = document.getElementById('lock-error');
  const chatCard = document.getElementById('chat-card');
  const welcomeOverlay = document.getElementById('welcome-overlay');
  const messagesEl = document.getElementById('messages');
  const textInput = document.getElementById('text-input');
  const sendBtn = document.getElementById('send-btn');

  // Ajoute ?debug=1 à l'URL pour voir le détail technique des erreurs (utile pour Antoine, invisible sinon)
  const DEBUG = new URLSearchParams(window.location.search).get('debug') === '1';

  let passphrase = '';
  let history = []; // { role: 'user' | 'assistant', content: string }

  const ARABIC_RE = /[\u0600-\u06FF]/;

  function addMessage(role, content, debugDetail) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
    if (ARABIC_RE.test(content)) {
      div.style.direction = 'rtl';
      div.style.textAlign = 'right';
    }
    div.textContent = content;
    if (DEBUG && debugDetail) {
      const small = document.createElement('span');
      small.className = 'debug-detail';
      small.textContent = '[debug] ' + debugDetail;
      div.appendChild(small);
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function unlock() {
    passphrase = lockInput.value;
    lockBtn.disabled = true;
    lockError.textContent = '';
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: '__ping__', history: [], passphrase })
      });
      if (res.status === 401) {
        lockError.textContent = 'Mot de passe incorrect, réessaie.';
        lockBtn.disabled = false;
        return;
      }
      lockScreen.classList.add('hidden');
      welcomeOverlay.classList.remove('hidden');
      setTimeout(() => {
        welcomeOverlay.classList.add('fade-out');
        setTimeout(() => {
          welcomeOverlay.classList.add('hidden');
          chatCard.classList.remove('hidden');
          addMessage('ai', "Pose-moi n'importe quelle question, je connais tout par cœur.");
          textInput.focus();
        }, 700);
      }, 1700);
    } catch (e) {
      lockError.textContent = 'Erreur de connexion, réessaie.';
      lockBtn.disabled = false;
    }
  }

  lockBtn.addEventListener('click', unlock);
  lockInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

  async function sendMessage() {
    const text = textInput.value.trim();
    if (!text) return;
    textInput.value = '';
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const typingEl = addMessage('ai', '...');
    typingEl.classList.add('typing');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history, passphrase })
      });
      const data = await res.json();
      typingEl.remove();

      if (res.status === 401) {
        addMessage('ai', "Le mot de passe a expiré, recharge la page pour le ressaisir.");
        return;
      }

      if (!res.ok || !data.reply) {
        const detail = data && (data.error || JSON.stringify(data.details || {}));
        addMessage('ai', "Désolé princesse, petit souci technique, réessaie.", detail);
        return;
      }

      addMessage('ai', data.reply);
      history.push({ role: 'assistant', content: data.reply });
    } catch (e) {
      typingEl.remove();
      addMessage('ai', "Petit souci de connexion, réessaie dans un instant.", String(e));
    } finally {
      sendBtn.disabled = false;
      textInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
